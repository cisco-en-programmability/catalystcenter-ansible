---
- name: Get network devices info on Cisco Catalyst Center
  hosts: localhost
  connection: local
  vars_files:
    - vars/credentials.yml
  tasks:
    - name: Get Network Devices Info on Cisco Catalyst Center
      cisco.catalystcenter.network_devices_info_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        config_verify: false
        catalystcenter_api_task_timeout: 1000
        catalystcenter_task_poll_interval: 1
        state: gathered
        config:
          - network_devices:
              - site_hierarchy: Global/USA/SAN JOSE
                device_type: "Cisco Catalyst 9300 Switch"
                device_role: "ACCESS"
                device_family: "Switches and Hubs"
                software_version: "17.12.1"
                os_type: "IOS-XE"
                device_identifier:
                  - ip_address: ["204.1.2.1"]
                  - serial_number: ["FCW2137L0SB"]
                  - hostname: ["SJ-BN-9300.cisco.local"]
                  - mac_address: ["90:88:55:90:26:00"]
                timeout: 60
                retries: 3
                interval: 10
                requested_info:
                  - device_info
                  - interface_info
                  - interface_vlan_info
                  - line_card_info
                  - supervisor_card_info
                  - poe_info
                  - module_count_info
                  - connected_device_info
                  - device_interfaces_by_range_info
                  - device_config_info
                  - device_summary_info
                  - device_polling_interval_info
                  - device_stack_info
                  - device_link_mismatch_info
                output_file_info:
                  file_path: "{{ output_dir | default(playbook_dir + '/output') }}"
                  file_format: json
                  file_mode: w
                  timestamp: true
