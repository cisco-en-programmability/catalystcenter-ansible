---
- name: Get Fabric devices info from Cisco Catalyst Center
  hosts: localhost
  connection: local
  vars_files:
    - vars/credentials.yml
  tasks:
    - name: Get Fabric devices info from Cisco Catalyst Center
      cisco.catalystcenter.fabric_devices_info_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        config_verify: true
        catalystcenter_api_task_timeout: 1000
        catalystcenter_task_poll_interval: 1
        state: gathered
        config:
          - fabric_devices:
              - fabric_site_hierarchy: "Global/rishipat_area/Fabric-area-1"  # Mandatory parameter
                fabric_device_role: "EDGE_NODE"
                device_identifier:
                  - ip_address: ["192.168.200.69"]
                  - serial_number: ["FOC2443L1VQ"]
                  - hostname: ["Fabric-9300-2-2.rcdnlabcead.com"]
                timeout: 30
                retries: 3
                interval: 10
                requested_info:
                  - fabric_info
                  - handoff_info
                  - onboarding_info
                  - connected_devices_info
                  - device_health_info
                  - device_issues_info
                output_file_info:
                  file_path: /Users/priyadharshini/Downloads/fabric_device_info
                  file_format: yaml
                  file_mode: w
                  timestamp: false
