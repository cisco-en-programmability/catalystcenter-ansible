---
- name: Generate assurance issue playbook config configuration from Cisco Catalyst Center
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "credentials.yml"
  tasks:
    # Example 1: Generate all configurations automatically (auto-discovery)
    - name: Generate complete assurance issue configuration
      cisco.catalystcenter.assurance_issue_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        state: gathered
        file_path: "tmp/active_issues_filtered.yml"
        file_mode: "overwrite"

    # Example 2: Generate all components config
    - name: Generate YAML configuration for all components
      cisco.catalystcenter.assurance_issue_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        state: gathered
        config:
          component_specific_filters:
            components_list:
              - assurance_user_defined_issue_settings

    # Example 3: Generate user-defined issue settings with filters
    - name: Generate YAML configuration for user-defined issues
      cisco.catalystcenter.assurance_issue_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        state: gathered
        file_path: "tmp/user_defined_issues2.yml"
        file_mode: "overwrite"
        config:
          component_specific_filters:
            components_list:
              - assurance_user_defined_issue_settings
            assurance_user_defined_issue_settings:
              - name: "Shut fangone"
                is_enabled: true
              - name: "Shut lc fangone"
                is_enabled: true
