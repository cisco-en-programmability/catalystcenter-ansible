# Example 6: Auto-populate components_list from component filters
- name: Generate configuration with auto-populated components_list
  hosts: catalystcenter_servers
  vars_files:
    - credentials.yml
  gather_facts: false
  connection: local
  tasks:
    - name: Export tags by providing filters without explicit components_list
      cisco.catalystcenter.tags_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_log_append: false
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        state: gathered
        file_path: "/tmp/catc_tags.yaml"
        file_mode: "overwrite"
        config:
          component_specific_filters:
            # No components_list specified, but tags filters are provided
            # The 'tags' component will be automatically added to components_list
            tags:
              - tag_name: Production
              - tag_name: Data-Center
      # This will automatically include 'tags' in components_list and retrieve only those tags

