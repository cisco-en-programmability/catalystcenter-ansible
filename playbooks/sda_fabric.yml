# noqa all
---
- name: Sda fabric
  hosts: catalystcenter_servers
  vars_files:
    - vars/credentials.yml
  gather_facts: false
  tasks:
    - name: Create an sda_fabric
      cisco.catalystcenter.sda_fabric_sites:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        state: present
        payload:
          - siteId: "{{ site_id }}"
            authenticationProfileName: "No Authentication"
            isPubSubEnabled: false
      register: sda_fabric_result

    - name: Show new sda_fabric
      ansible.builtin.debug:
        msg: "{{ sda_fabric_result }}"
      when:
        - sda_fabric_result is defined
