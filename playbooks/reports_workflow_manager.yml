---
- name: Configure reports on Cisco Catalyst Center
  hosts: catalystcenter_servers
  vars_files:
    - vars/credentials.yml
  gather_facts: false
  connection: local
  tasks:
    - name: Create/Schedule a report configuration.
      cisco.catalystcenter.reports_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log_level: DEBUG
        catalystcenter_log: true
        state: merged
        config_verify: true
        config:
          - generate_report:
              - name: "compliance_report"
                view_group_name: "Compliance"
                deliveries:
                  - delivery_type: "DOWNLOAD"
                    file_path: "/Users/mekandar/Desktop"
                schedule:
                  schedule_type: "SCHEDULE_NOW"
                  time_zone: "Asia/Calcutta"
                view:
                  view_name: "Network Device Compliance"
                  field_groups:
                    - name: "inventoryAllData"
                      display_name: "All Data"
                  format:
                    format_type: "CSV"
                  filters:
                    - name: "Location"
                      display_name: "Location"
                      filter_type: "MULTI_SELECT_TREE"
                      value:
                        - value: "Global/India"
                tags: []
