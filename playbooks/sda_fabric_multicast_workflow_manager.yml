---
- name: Configure multicast in the SDA Fabric
  hosts: catalystcenter_servers
  vars_files:
    - vars/credentials.yml
  gather_facts: false
  connection: local
  tasks:
    - name: Add the multicast configuration to the fabric site.
      cisco.catalystcenter.sda_fabric_multicast_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_log_append: true
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        state: merged
        config_verify: true
        config:
          - fabric_multicast:
              - fabric_name: Global/USA/SAN JOSE
                layer3_virtual_network: L3_VN_MUL_1
                replication_mode: HEADEND_REPLICATION
                ip_pool_name: ip_pool_dual_mul

                ssm:
                  ipv4_ssm_ranges:
                    - "227.0.0.0/8"

                asm:
                  - rp_device_location: FABRIC
                    network_device_ips:
                      - "204.1.2.3"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "232.0.0.0/8"
                      - "233.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv4_address: "10.0.0.1"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "234.0.0.0/8"
                      - "235.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv6_address: "2001::1"
                    is_default_v6_rp: false
                    ipv6_asm_ranges:
                      - "FF04::/64"
                      - "FF05::/64"

    - name: Update the multicast configuration to the fabric site.
      cisco.catalystcenter.sda_fabric_multicast_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_log_append: true
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        state: merged
        config_verify: true
        config:
          - fabric_multicast:
              - fabric_name: Global/USA/SAN JOSE
                layer3_virtual_network: L3_VN_MUL_1
                replication_mode: NATIVE_MULTICAST
                ip_pool_name: ip_pool_dual_mul

                ssm:
                  ipv4_ssm_ranges:
                    - "228.0.0.0/8"

                asm:
                  - rp_device_location: FABRIC
                    network_device_ips:
                      - "204.1.2.3"
                      - "204.1.2.4"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "232.0.0.0/8"
                      - "233.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv4_address: "10.0.0.3"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "235.0.0.0/8"
                      - "236.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv6_address: "2001::1"
                    is_default_v6_rp: false
                    ipv6_asm_ranges:
                      - "FF04::/64"
                      - "FF05::/64"

    - name: Delete the asm configurations of the multicast configuration.
      cisco.catalystcenter.sda_fabric_multicast_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_log_append: true
        catalystcenter_log_file_path: "{{ catalystcenter_log_file_path }}"
        state: deleted
        config_verify: true
        config:
          - fabric_multicast:
              - fabric_name: Global/USA/SAN JOSE
                layer3_virtual_network: L3_VN_MUL_1
                replication_mode: NATIVE_MULTICAST

                asm:
                  - rp_device_location: FABRIC
                    network_device_ips:
                      - "204.1.2.3"
                      - "204.1.2.4"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "232.0.0.0/8"
                      - "233.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv4_address: "10.0.0.3"
                    is_default_v4_rp: false
                    ipv4_asm_ranges:
                      - "235.0.0.0/8"
                      - "236.0.0.0/8"

                  - rp_device_location: EXTERNAL
                    ex_rp_ipv6_address: "2001::1"
                    is_default_v6_rp: false
                    ipv6_asm_ranges:
                      - "FF04::/64"
                      - "FF05::/64"
