---
# Playbook to generate YAML configurations for Assurance Device Health Score Settings

- name: Assurance Device Health Score Settings Playbook Config Generator Examples
  hosts: localhost
  vars_files:
    - "credentials.yml"
  connection: local
  gather_facts: false
  tasks:
    - name: Generate all device health score settings configurations
      cisco.catalystcenter.assurance_device_health_score_settings_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        catalystcenter_task_poll_interval: 1
        state: gathered
        file_path: "generated_files/device_health_score_settings_playbook1.yml"
        file_mode: "append"
        config:
          component_specific_filters:
            components_list: ["device_health_score_settings"]
            device_health_score_settings:
              - device_families: ["ROUTER", "WIRELESS_CONTROLLER"]
              - device_families: ["UNIFIED_AP", "SWITCH_AND_HUB"]
              - device_families: ["WIRELESS_CONTROLLER"]
