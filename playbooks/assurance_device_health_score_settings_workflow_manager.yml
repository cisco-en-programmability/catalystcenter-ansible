---
- name: Configure assurance healthscore settings on Cisco Catalyst Center
  hosts: localhost
  vars_files:
    - vars/credentials.yml
  connection: local
  gather_facts: false
  tasks:
    - name: Update assurance healthscore settings KPI's
      cisco.catalystcenter.assurance_device_health_score_settings_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        catalystcenter_task_poll_interval: 1
        state: merged
        config_verify: true
        config:
          - device_health_score:
              - device_family: UNIFIED_AP
                kpi_name: Interference 6 GHz
                include_for_overall_health: true
                threshold_value: 30
                synchronize_to_issue_threshold: false
              - device_family: ROUTER
                kpi_name: Link Error
                include_for_overall_health: true
                threshold_value: 80
                synchronize_to_issue_threshold: false
