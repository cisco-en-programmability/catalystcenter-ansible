---
- name: Generate network wireless profile playbook configuration from Cisco Catalyst Center
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "credentials.yml"
  tasks:
    # Example 1: Generate all wireless profile configurations
    - name: Generate complete wireless profile configuration
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_mode: "overwrite"
        file_path: "tmp/network_profile_wireless_workflow_playbook.yml"

    # Example 2: Generate wireless profile configurations by profile names
    - name: Generate wireless profile configurations by profile names
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_profilebase.yml"
        file_mode: "append"
        config:
          global_filters:
            profile_name_list:
              - nw_profile_2
              - Ansible Wireless Profile Solution

    # Example 3: Generate wireless profile configurations by SSIDs
    - name: Generate wireless profile configurations by SSIDs
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_ssidbase.yml"
        file_mode: "overwrite"
        config:
          global_filters:
            ssid_list:
              - GUEST
              - Corporate_WiFi

    # Example 4: Generate wireless profile configurations by AP zones
    - name: Generate wireless profile configurations by AP zones
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_apzonebase.yml"
        file_mode: "append"
        config:
          global_filters:
            ap_zone_list:
              - AP_Zone_North
              - HQ_AP_Zone

    # Example 5: Generate wireless profile configurations by feature templates
    - name: Generate wireless profile configurations by feature templates
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_feature_template_base.yml"
        file_mode: "append"
        config:
          global_filters:
            feature_template_list:
              - Default AAA_Radius_Attributes_Configuration
              - Default CleanAir 6GHz Design

    # Example 6: Generate wireless profile configurations by day-n templates
    - name: Generate wireless profile configurations by day-n templates
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_templatebase.yml"
        file_mode: "overwrite"
        config:
          global_filters:
            day_n_template_list:
              - Ans Wireless DayN 1

    # Example 7: Generate wireless profile configurations by additional interfaces
    - name: Generate wireless profile configurations by additional interfaces
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_interfacebase.yml"
        file_mode: "overwrite"
        config:
          global_filters:
            additional_interface_list:
              - VLAN_22

    # Example 8: Generate wireless profile configurations by sites
    - name: Generate wireless profile configurations by sites
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        catalystcenter_api_task_timeout: 1000
        dnac_task_poll_interval: 1
        state: gathered
        file_path: "tmp/network_profile_wireless_workflow_playbook_sitebase.yml"
        file_mode: "overwrite"
        config:
          global_filters:
            site_list:
              - Global/USA/SAN JOSE/SJ_BLD20/FLOOR1
              - Global/USA/SAN JOSE/SJ_BLD20/FLOOR2
