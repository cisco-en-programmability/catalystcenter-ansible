---
- name: Configure device credentials on Cisco Catalyst Center
  hosts: localhost
  connection: local
  gather_facts: false  # This space must be "no". It was set to false due to formatting errors.but the correct value is "no".
  vars_files:
    - vars/credentials.yml
  tasks:
    - name: Provision a wired device to a site
      cisco.catalystcenter.provision_workflow_manager:
        catalystcenter_host: "{{ catalystcenter_host }}"
        catalystcenter_username: "{{ catalystcenter_username }}"
        catalystcenter_password: "{{ catalystcenter_password }}"
        catalystcenter_verify: "{{ catalystcenter_verify }}"
        catalystcenter_port: "{{ catalystcenter_port }}"
        catalystcenter_version: "{{ catalystcenter_version }}"
        catalystcenter_debug: "{{ catalystcenter_debug }}"
        catalystcenter_log: true
        catalystcenter_log_level: DEBUG
        config_verify: true
        catalystcenter_api_task_timeout: 1000
        catalystcenter_task_poll_interval: 1
        state: merged
        config:
          - site_name_hierarchy: Global/USA/SAN JOSE/BLD23
            management_ip_address: 1.1.1.1
            primary_managed_ap_locations:
              - Global/USA/SAN JOSE/BLD23/FLOOR1_LEVEL2
            ap_authorization_list_name: "AP-Auth-List"
            authorize_mesh_and_non_mesh_aps: false
            feature_template:
              - design_name: test
                additional_identifiers:
                  wlan_profile_name: ARUBA_SSID_profile
                  site_name_hierarchy: Global/USA/SAN JOSE/BLD23
                excluded_attributes: [certificate_settings]
