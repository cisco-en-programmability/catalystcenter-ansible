---
- name: Playbook to manage Cisco Catalyst Center Device Inventory
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: deleted
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalystcenter_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalystcenter_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalystcenter_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalystcenter_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalystcenter_port | default(443) }}"
      catalystcenter_verify: "{{ catalystcenter_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalystcenter_debug | default(False) }}"
      catalystcenter_log: "{{ catalystcenter_log | default(False) }}"
      catalystcenter_log_level: "{{ catalystcenter_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalystcenter_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalystcenter_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalystcenter_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that inventory_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'inventory_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: inventory_details is not defined

    - name: Playbook start time for the inventory playbook
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Delete devices provided in file "{{ VARS_FILE_PATH | default('inventory / host variables') }}" and state "{{ state }}"
      cisco.catalystcenter.inventory_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ inventory_details.network_devices }}" 
      when: inventory_details.network_devices is defined
    - name: Playbook end time for the inventory playbook
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Inventory devices playbook execution time
      debug:
        msg: "Inventory devices playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: localhost
      run_once: true
