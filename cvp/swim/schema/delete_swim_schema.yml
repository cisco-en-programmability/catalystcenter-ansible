---
swim_details:
  delete_images: list(include('delete_image_details_type'), min=0, max=100, required=False)
catalystcenter_version: str(required=False)
catalystcenter_verify: bool(required=False)
catalystcenter_api_task_timeout: int(required=False, default=1200)
catalystcenter_debug: bool(required=False, default=False)
catalystcenter_log: bool(required=False, default=False)
catalystcenter_log_append: bool(required=False, default=True)
catalystcenter_log_file_path: str(required=False, default='catalystcenter.log')
catalystcenter_log_level: enum("CRITICAL", "ERROR", "WARNING", "INFO", "DEBUG", required=False)
catalyst_center_config_verify: bool(required=False)
delete_image_details_type:
  image_name: list(str(), required=True)