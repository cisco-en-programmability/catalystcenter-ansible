---
# tasks file for sda_fabric_virtual_networks_config_generator
- name: Generate SDA Fabric Virtual Networks playbook configuration
  cisco.catalystcenter.sda_fabric_virtual_networks_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ sda_fabric_virtual_networks_config_generator_state }}"
    file_path: "{{ sda_fabric_virtual_networks_config_generator_file_path if sda_fabric_virtual_networks_config_generator_file_path is not none else omit }}"
    file_mode: "{{ sda_fabric_virtual_networks_config_generator_file_mode }}"
    config: "{{ sda_fabric_virtual_networks_config_generator_config if sda_fabric_virtual_networks_config_generator_config is not none else omit }}"
  register: sda_fabric_virtual_networks_config_generator_result

- name: Display SDA Fabric Virtual Networks generator result
  ansible.builtin.debug:
    var: sda_fabric_virtual_networks_config_generator_result
  when: catalystcenter_debug | default(false)
