---
# tasks file for tags_config_generator
- name: Generate Tags playbook configuration
  cisco.catalystcenter.tags_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ tags_config_generator_state }}"
    file_path: "{{ tags_config_generator_file_path if tags_config_generator_file_path is not none else omit }}"
    file_mode: "{{ tags_config_generator_file_mode }}"
    config: "{{ tags_config_generator_config if tags_config_generator_config is not none else omit }}"
  register: tags_config_generator_result

- name: Display Tags generator result
  ansible.builtin.debug:
    var: tags_config_generator_result
  when: catalystcenter_debug | default(false)
