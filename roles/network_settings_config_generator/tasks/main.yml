---
# tasks file for network_settings_config_generator
- name: Generate Network Settings playbook configuration
  cisco.catalystcenter.network_settings_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ network_settings_config_generator_state }}"
    file_path: "{{ network_settings_config_generator_file_path if network_settings_config_generator_file_path is not none else omit }}"
    file_mode: "{{ network_settings_config_generator_file_mode }}"
    config: "{{ network_settings_config_generator_config if network_settings_config_generator_config is not none else omit }}"
  register: network_settings_config_generator_result

- name: Display Network Settings generator result
  ansible.builtin.debug:
    var: network_settings_config_generator_result
  when: catalystcenter_debug | default(false)
