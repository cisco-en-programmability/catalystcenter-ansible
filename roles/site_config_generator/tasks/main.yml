---
# tasks file for site_config_generator
- name: Generate Site playbook configuration
  cisco.catalystcenter.site_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ site_config_generator_state }}"
    file_path: "{{ site_config_generator_file_path if site_config_generator_file_path is not none else omit }}"
    file_mode: "{{ site_config_generator_file_mode }}"
    config: "{{ site_config_generator_config if site_config_generator_config is not none else omit }}"
  register: site_config_generator_result

- name: Display Site generator result
  ansible.builtin.debug:
    var: site_config_generator_result
  when: catalystcenter_debug | default(false)
