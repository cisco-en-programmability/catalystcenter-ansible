---
# tasks file for accesspoint_config_generator
- name: Generate Access Point playbook configuration
  cisco.catalystcenter.accesspoint_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ accesspoint_config_generator_state }}"
    file_path: "{{ accesspoint_config_generator_file_path if accesspoint_config_generator_file_path is not none else omit }}"
    file_mode: "{{ accesspoint_config_generator_file_mode }}"
    config: "{{ accesspoint_config_generator_config if accesspoint_config_generator_config is not none else omit }}"
  register: accesspoint_config_generator_result

- name: Display Access Point generator result
  ansible.builtin.debug:
    var: accesspoint_config_generator_result
  when: catalystcenter_debug | default(false)
