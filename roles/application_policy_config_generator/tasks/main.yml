---
# tasks file for application_policy_config_generator
- name: Generate Application Policy playbook configuration
  cisco.catalystcenter.application_policy_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ application_policy_config_generator_state }}"
    file_path: "{{ application_policy_config_generator_file_path if application_policy_config_generator_file_path is not none else omit }}"
    file_mode: "{{ application_policy_config_generator_file_mode }}"
    config: "{{ application_policy_config_generator_config if application_policy_config_generator_config is not none else omit }}"
  register: application_policy_config_generator_result

- name: Display Application Policy generator result
  ansible.builtin.debug:
    var: application_policy_config_generator_result
  when: catalystcenter_debug | default(false)
