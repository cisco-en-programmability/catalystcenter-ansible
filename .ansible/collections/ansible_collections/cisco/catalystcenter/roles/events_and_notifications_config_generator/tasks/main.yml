---
# tasks file for events_and_notifications_config_generator
- name: Generate Events And Notifications playbook configuration
  cisco.catalystcenter.events_and_notifications_playbook_config_generator:
    catalystcenter_host: "{{ catalystcenter_host }}"
    catalystcenter_username: "{{ catalystcenter_username }}"
    catalystcenter_password: "{{ catalystcenter_password }}"
    catalystcenter_verify: "{{ catalystcenter_verify }}"
    catalystcenter_port: "{{ catalystcenter_port }}"
    catalystcenter_version: "{{ catalystcenter_version }}"
    catalystcenter_debug: "{{ catalystcenter_debug }}"
    catalystcenter_log_level: "{{ catalystcenter_log_level }}"
    catalystcenter_log: "{{ catalystcenter_log }}"
    state: "{{ events_and_notifications_config_generator_state }}"
    file_path: "{{ events_and_notifications_config_generator_file_path if events_and_notifications_config_generator_file_path is not none else omit }}"
    file_mode: "{{ events_and_notifications_config_generator_file_mode }}"
    config: "{{ events_and_notifications_config_generator_config if events_and_notifications_config_generator_config is not none else omit }}"
  register: events_and_notifications_config_generator_result

- name: Display Events And Notifications generator result
  ansible.builtin.debug:
    var: events_and_notifications_config_generator_result
  when: catalystcenter_debug | default(false)
