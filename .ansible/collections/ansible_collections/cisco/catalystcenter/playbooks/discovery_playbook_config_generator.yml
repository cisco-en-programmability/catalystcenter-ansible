---
# ===================================================================================================
#  DISCOVERY PLAYBOOK CONFIG GENERATOR - EXAMPLE PLAYBOOK
# ===================================================================================================

- name: Catalyst Center Discovery Playbook Config Generator Examples
  hosts: dnac_servers
  gather_facts: false
  connection: local
  vars_files:
    - "credentials.yml"
  vars:
    # Catalyst Center connection parameters
    catalystcenter_login: &catalystcenter_login
      catalystcenter_host: "{{ catalystcenter_host }}"
      catalystcenter_username: "{{ catalystcenter_username }}"
      catalystcenter_password: "{{ catalystcenter_password }}"
      catalystcenter_verify: "{{ catalystcenter_verify }}"
      catalystcenter_port: "{{ catalystcenter_port }}"
      catalystcenter_version: "{{ catalystcenter_version }}"
      catalystcenter_debug: "{{ catalystcenter_debug }}"
      catalystcenter_log: true
      catalystcenter_log_level: "{{ catalystcenter_log_level }}"
      catalystcenter_log_append: false

  tasks:
    # =============================================================================
    # BASIC DISCOVERY CONFIGURATION GENERATION
    # =============================================================================

    - name: "Generate YAML Configuration for all discovery tasks"
      cisco.catalystcenter.discovery_playbook_config_generator:
        <<: *catalystcenter_login
        state: gathered

    - name: "Generate YAML Configuration with custom file path"
      cisco.catalystcenter.discovery_playbook_config_generator:
        <<: *catalystcenter_login
        state: gathered
        file_path: "tmp/complete_discovery_config.yml"
        file_mode: overwrite

    # =============================================================================
    # DISCOVERY FILTERING BY NAME
    # =============================================================================

    - name: "Generate YAML Configuration for specific discoveries by name"
      cisco.catalystcenter.discovery_playbook_config_generator:
        <<: *catalystcenter_login
        state: gathered
        file_path: "tmp/specific_discoveries.yml"
        file_mode: append
        config:
          global_filters:
            discovery_name_list:
              - Multi Range Discovery


    # =============================================================================
    # DISCOVERY FILTERING BY TYPE
    # =============================================================================

    - name: "Generate YAML Configuration for CDP and LLDP discoveries"
      cisco.catalystcenter.discovery_playbook_config_generator:
        <<: *catalystcenter_login
        state: gathered
        file_path: "tmp/cdp_lldp_discoveries.yml"
        file_mode: append
        config:
          global_filters:
            discovery_type_list:
              - Range
